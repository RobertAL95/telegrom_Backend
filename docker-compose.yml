version: '3.8'

services:
  # =====================================================
  # 🚀 Backend principal
  # =====================================================
  backend:
    build: .
    container_name: flym_backend
    ports:
      - "5001:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      
      # 🔐 Seguridad
      JWT_SECRET: super_secret_key_123
      JWT_EXPIRES_IN: 1h
      JWT_INVITE_EXPIRES_IN: 10m

      # 🍃 MongoDB
      MONGO_URI: mongodb://mongo:27017/flymdb

      # 🔴 Redis
      REDIS_URL: redis://redis:6379

      # ☁️ CLOUDINARY (👇 ESTO ES LO QUE FALTABA AGREGAR)
      # Docker leerá estos valores de tu archivo .env local
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

    networks:
      - flymnet

    # 🔥🔥🔥 VOLÚMENES (SIN CAMBIOS) 🔥🔥🔥
    volumes:
      - ./:/app
      - /app/node_modules

    restart: unless-stopped
    command: npm run dev 

    # 🛡️ LÍMITES DE RECURSOS (BACKEND)
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G

  # =====================================================
  # 🍃 MongoDB (SIN CAMBIOS)
  # =====================================================
  mongo:
    image: mongo:6
    container_name: flym_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - flymnet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G

  # =====================================================
  # 🔴 Redis (SIN CAMBIOS)
  # =====================================================
  redis:
    image: redis:7
    container_name: flym_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - flymnet
    command: >
      redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # =====================================================
  # 🧭 Mongo Express (SIN CAMBIOS)
  # =====================================================
  mongo-express:
    image: mongo-express:latest
    container_name: flym_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - flymnet
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 200M

volumes:
  mongo_data:

networks:
  flymnet:
    driver: bridge